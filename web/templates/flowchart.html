<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алгоритм E2EE чата - Интерактивная визуализация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .diagram-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            border-right: 2px solid #ddd;
        }
        .logs-section {
            width: 400px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #ddd;
        }
        .logs-header {
            padding: 15px;
            background: #2c3e50;
            color: white;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
        }
        .logs-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            background: #1e1e1e;
            color: #00ff00;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .logs-empty {
            color: #888;
            text-align: center;
            padding: 50px 20px;
        }
        svg {
            width: 100%;
            height: auto;
        }
        .block, .start-end {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .block:hover, .start-end:hover, .decision:hover {
            opacity: 0.7;
            filter: drop-shadow(0 0 8px #3498db);
        }
        .block.active, .start-end.active, .decision.active {
            stroke-width: 3 !important;
            filter: drop-shadow(0 0 12px #2ecc71);
        }
        .key-value {
            background: #2a2a2a;
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #3498db;
        }
        .key-name {
            color: #61dafb;
            font-weight: bold;
        }
        .key-value-text {
            color: #a6e22e;
            word-break: break-all;
        }
        .step-title {
            color: #61dafb;
            font-size: 13px;
            font-weight: bold;
            margin: 10px 0 5px 0;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        .copy-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 5px;
        }
        .copy-btn:hover {
            background: #2980b9;
        }
        @media (max-width: 1024px) {
            .logs-section {
                width: 350px;
            }
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .logs-section {
                width: 100%;
                height: 300px;
                border-left: none;
                border-top: 2px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="diagram-section">
            <svg id="flowchart" viewBox="0 0 800 2200" xmlns="http://www.w3.org/2000/svg">
                <!-- Диаграмма будет загружена здесь -->
            </svg>
        </div>
        <div class="logs-section">
            <div class="logs-header">📋 Логи операции</div>
            <div class="logs-content" id="logs-content">
                <div class="logs-empty">Наведите на блок диаграммы</div>
            </div>
        </div>
    </div>

    <script>
        const logsContent = document.getElementById('logs-content');
        const flowchart = document.getElementById('flowchart');

        // Загрузка SVG
        fetch('/static/flowchart.svg')
            .then(r => r.text())
            .then(svg => {
                flowchart.innerHTML = svg;
                attachEventListeners();
            });

        function attachEventListeners() {
            const blocks = flowchart.querySelectorAll('[id^="step-"]');
            blocks.forEach(block => {
                block.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const stepId = block.id.replace('step-', '');
                    loadStepLogs(stepId);

                    // Визуальное выделение
                    blocks.forEach(b => b.classList.remove('active'));
                    block.classList.add('active');
                });

                block.addEventListener('mouseenter', () => {
                    const stepId = block.id.replace('step-', '');
                    loadStepLogs(stepId);
                });
            });
        }

        function loadStepLogs(stepId) {
            logsContent.innerHTML = '<div class="loading">⏳ Загрузка логов...</div>';

            fetch(`/api/flowchart/step/${stepId}`)
                .then(r => r.json())
                .then(data => {
                    let html = '';

                    // Заголовок
                    html += `<div class="step-title">${data.step_id} ${data.title}</div>`;
                    html += `<div style="color: #bbb; font-size: 11px; margin-bottom: 10px;">${data.description}</div>`;

                    // Логи
                    if (data.logs) {
                        html += `<div class="step-title">📝 Логи:</div>`;
                        const logLines = data.logs.split('\n').filter(l => l.trim());
                        logLines.forEach(line => {
                            // Подсветка разных типов логов
                            if (line.includes('✓') || line.includes('ГОТОВО')) {
                                html += `<div style="color: #2ecc71;">${escapeHtml(line)}</div>`;
                            } else if (line.includes('✗') || line.includes('ошибка')) {
                                html += `<div style="color: #e74c3c;">${escapeHtml(line)}</div>`;
                            } else if (line.includes('[')) {
                                html += `<div style="color: #f39c12;">${escapeHtml(line)}</div>`;
                            } else {
                                html += `<div>${escapeHtml(line)}</div>`;
                            }
                        });
                    }

                    // Ключи и компоненты
                    if (data.keys && Object.keys(data.keys).length > 0) {
                        html += `<div class="step-title">🔐 Ключи и компоненты:</div>`;
                        for (const [key, value] of Object.entries(data.keys)) {
                            if (value === null || value === undefined) continue;
                            let displayValue = value;
                            if (typeof value === 'object') {
                                displayValue = JSON.stringify(value, null, 2);
                            }
                            html += `
                                <div class="key-value">
                                    <span class="key-name">${escapeHtml(key)}:</span>
                                    <button class="copy-btn" onclick="copyToClipboard('${escapeHtml(displayValue.toString())}')">📋</button>
                                    <br><span class="key-value-text">${escapeHtml(displayValue.toString())}</span>
                                </div>
                            `;
                        }
                    }

                    // Длительность
                    if (data.duration_ms) {
                        html += `<div style="color: #95a5a6; margin-top: 10px; font-size: 11px;">⏱️ Время: ${data.duration_ms}ms</div>`;
                    }

                    logsContent.innerHTML = html;
                })
                .catch(err => {
                    logsContent.innerHTML = `<div class="logs-empty">❌ Ошибка загрузки логов:<br>${err.message}</div>`;
                });
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✓ Скопировано в буфер обмена');
            });
        }

        // Закрытие сессии
        window.addEventListener('beforeunload', () => {
            fetch('/api/flowchart/session', { method: 'DELETE' });
        });
    </script>
</body>
</html>
