<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 2200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .block { fill: white; stroke: #333; stroke-width: 2; }
      .start-end { rx: 20; }
      .decision { fill: white; stroke: #333; stroke-width: 2; }
      .text { font-family: Arial; font-size: 13px; text-anchor: middle; }
      .title { font-weight: bold; font-size: 14px; }
      .line { stroke: #333; stroke-width: 2; fill: none; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 11px; fill: #666; }
      .block:hover { fill: #e8f4f8; stroke-width: 3; }
      .decision:hover { fill: #fff9e6; stroke-width: 3; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- 1.0 НАЧАЛО -->
  <rect x="250" y="20" width="300" height="50" class="block start-end" id="step-1.0"/>
  <text x="400" y="50" class="text title">1.0 НАЧАЛО</text>
  <path d="M 400 70 L 400 110" class="arrow"/>

  <!-- 1.1 Инициализация клиента -->
  <rect x="200" y="110" width="400" height="60" class="block" id="step-1.1"/>
  <text x="400" y="135" class="text title">1.1 Инициализация клиента</text>
  <text x="400" y="160" class="text">(Web UI / CLI)</text>
  <path d="M 400 170 L 400 210" class="arrow"/>

  <!-- 1.2 Подключение к серверу -->
  <rect x="200" y="210" width="400" height="60" class="block" id="step-1.2"/>
  <text x="400" y="235" class="text title">1.2 Подключение к серверу</text>
  <text x="400" y="260" class="text">WSS: /ws</text>
  <path d="M 400 270 L 400 310" class="arrow"/>

  <!-- 1.3 Отображение экрана -->
  <rect x="200" y="310" width="400" height="60" class="block" id="step-1.3"/>
  <text x="400" y="335" class="text title">1.3 Отображение экрана</text>
  <text x="400" y="360" class="text">входа / регистрации</text>
  <path d="M 400 370 L 400 410" class="arrow"/>

  <!-- 1.4 Решение: Пользователь новый? -->
  <polygon points="400,410 500,460 400,510 300,460" class="decision" id="step-1.4"/>
  <text x="400" y="465" class="text title">1.4 Пользователь</text>
  <text x="400" y="480" class="text">новый?</text>

  <!-- НЕТ → 2.0 ВХОД -->
  <path d="M 300 460 L 150 460" class="arrow"/>
  <text x="220" y="450" class="label">Нет</text>
  <rect x="20" y="430" width="130" height="60" class="block" id="step-2.0"/>
  <text x="85" y="465" class="text title">2.0</text>
  <text x="85" y="485" class="text">Вход</text>

  <!-- ДА → 3.0 РЕГИСТРАЦИЯ -->
  <path d="M 500 460 L 650 460" class="arrow"/>
  <text x="580" y="450" class="label">Да</text>
  <rect x="650" y="430" width="130" height="60" class="block" id="step-3.0"/>
  <text x="715" y="465" class="text title">3.0</text>
  <text x="715" y="485" class="text">Регистрация</text>

  <!-- 2.1 Ввод учётных данных -->
  <path d="M 85 430 L 85 400" class="arrow"/>
  <rect x="20" y="340" width="130" height="60" class="block" id="step-2.1"/>
  <text x="85" y="360" class="text" style="font-size: 11px;">Ввод учётных</text>
  <text x="85" y="377" class="text" style="font-size: 11px;">данных</text>
  <text x="85" y="392" class="text" style="font-size: 10px;">(username,</text>
  <text x="85" y="404" class="text" style="font-size: 10px;">password)</text>

  <!-- 2.2 Отправка запроса входа -->
  <path d="M 85 340 L 85 310" class="arrow"/>
  <rect x="20" y="250" width="130" height="60" class="block" id="step-2.2"/>
  <text x="85" y="270" class="text" style="font-size: 11px;">Отправка запроса</text>
  <text x="85" y="285" class="text" style="font-size: 11px;">входа WSS:</text>
  <text x="85" y="300" class="text" style="font-size: 11px;">type=login</text>

  <!-- 2.3 Проверка учётных данных на сервере -->
  <path d="M 85 250 L 85 220" class="arrow"/>
  <rect x="20" y="160" width="130" height="60" class="block" id="step-2.3"/>
  <text x="85" y="180" class="text" style="font-size: 11px;">Проверка</text>
  <text x="85" y="193" class="text" style="font-size: 11px;">учётных данных</text>
  <text x="85" y="206" class="text" style="font-size: 11px;">на сервере</text>

  <!-- 2.4 Решение: Вход удачен? -->
  <path d="M 85 160 L 85 130" class="arrow"/>
  <polygon points="85,80 135,110 85,140 35,110" class="decision" id="step-2.4"/>
  <text x="85" y="110" class="text" style="font-size: 11px;">Вход</text>
  <text x="85" y="123" class="text" style="font-size: 11px;">удачен?</text>

  <!-- НЕТ → 2.5 Ошибка входа -->
  <path d="M 35 110 L 0 110" class="arrow"/>
  <text x="12" y="100" class="label">Нет</text>
  <rect x="-130" y="80" width="130" height="60" class="block" id="step-2.5"/>
  <text x="-65" y="115" class="text">2.5 Ошибка входа</text>

  <!-- ДА → 2.6 Загрузка данных пользователя -->
  <path d="M 85 80 L 85 30" class="arrow"/>
  <text x="70" y="55" class="label">Да</text>
  <rect x="20" y="-30" width="130" height="60" class="block" id="step-2.6"/>
  <text x="85" y="-5" class="text" style="font-size: 11px;">Загрузка данных</text>
  <text x="85" y="10" class="text" style="font-size: 11px;">пользователя и список</text>
  <text x="85" y="23" class="text" style="font-size: 10px;">контактов (из Redis)</text>

  <!-- 3.1 Ввод данных -->
  <path d="M 715 430 L 715 400" class="arrow"/>
  <rect x="650" y="340" width="130" height="60" class="block" id="step-3.1"/>
  <text x="715" y="365" class="text" style="font-size: 11px;">Ввод данных</text>
  <text x="715" y="378" class="text" style="font-size: 10px;">(username,</text>
  <text x="715" y="390" class="text" style="font-size: 10px;">password)</text>

  <!-- 3.2 Генерация ключей клиента -->
  <path d="M 715 340 L 715 310" class="arrow"/>
  <rect x="650" y="250" width="130" height="60" class="block" id="step-3.2"/>
  <text x="715" y="270" class="text" style="font-size: 11px;">Генерация ключей</text>
  <text x="715" y="283" class="text" style="font-size: 10px;">клиента</text>
  <text x="715" y="296" class="text" style="font-size: 10px;">(IK, SPK, OPK)</text>

  <!-- 3.3 Загрузка публичного бандла -->
  <path d="M 715 250 L 715 220" class="arrow"/>
  <rect x="650" y="160" width="130" height="60" class="block" id="step-3.3"/>
  <text x="715" y="180" class="text" style="font-size: 11px;">Загрузка публичного</text>
  <text x="715" y="193" class="text" style="font-size: 11px;">бандла в KDS</text>
  <text x="715" y="206" class="text" style="font-size: 10px;">(HTTPS API)</text>

  <!-- 3.4 Регистрация пользователя -->
  <path d="M 715 160 L 715 130" class="arrow"/>
  <rect x="650" y="70" width="130" height="60" class="block" id="step-3.4"/>
  <text x="715" y="90" class="text" style="font-size: 11px;">Регистрация</text>
  <text x="715" y="103" class="text" style="font-size: 11px;">пользователя на</text>
  <text x="715" y="116" class="text" style="font-size: 10px;">сервере WSS:</text>

  <!-- 3.5 Сохранение ключей на устройстве -->
  <path d="M 715 70 L 715 40" class="arrow"/>
  <rect x="650" y="-20" width="130" height="60" class="block" id="step-3.5"/>
  <text x="715" y="0" class="text" style="font-size: 11px;">Сохранение ключей</text>
  <text x="715" y="13" class="text" style="font-size: 11px;">на устройстве</text>

  <!-- Синхронизация с 2.6 и 3.5 -->
  <path d="M 85 -30 L 400 -30 L 400 100" class="arrow"/>
  <path d="M 715 -20 L 400 -20 L 400 100" class="arrow"/>

  <!-- 4.0 Отображение интерфейса чата -->
  <rect x="200" y="100" width="400" height="60" class="block" id="step-4.0"/>
  <text x="400" y="125" class="text title">4.0 Отображение интерфейса чата</text>
  <text x="400" y="150" class="text">(контакты, сообщения)</text>
  <path d="M 400 160 L 400 200" class="arrow"/>

  <!-- 5.0 Выбор действия -->
  <rect x="200" y="200" width="400" height="60" class="block" id="step-5.0"/>
  <text x="400" y="225" class="text title">5.0 Выбор действия</text>
  <path d="M 400 260 L 400 300" class="arrow"/>

  <!-- 5.1 Решение: Отправить сообщение? -->
  <polygon points="400,300 500,350 400,400 300,350" class="decision" id="step-5.1"/>
  <text x="400" y="345" class="text" style="font-size: 11px;">Отправить</text>
  <text x="400" y="360" class="text" style="font-size: 11px;">сообщение?</text>

  <!-- НЕТ → 5.7 Ожидание входящих сообщений -->
  <path d="M 300 350 L 150 350" class="arrow"/>
  <text x="220" y="340" class="label">Нет</text>
  <rect x="20" y="320" width="130" height="60" class="block" id="step-5.7"/>
  <text x="85" y="345" class="text" style="font-size: 11px;">Ожидание входящих</text>
  <text x="85" y="360" class="text" style="font-size: 11px;">сообщений</text>
  <text x="85" y="373" class="text" style="font-size: 10px;">(рассшифровка)</text>

  <!-- ДА → 5.2 Выбор получателя -->
  <path d="M 400 300 L 400 270" class="arrow"/>
  <text x="385" y="280" class="label">Да</text>
  <rect x="200" y="210" width="400" height="60" class="block" id="step-5.2"/>
  <text x="400" y="235" class="text title">5.2 Выбор получателя и ввод текста</text>

  <!-- Синхронизация потоков -->
  <path d="M 85 320 L 85 150 L 400 150" class="arrow"/>
  <path d="M 400 210 L 400 700" class="arrow" id="main-flow"/>

  <!-- 6.0 Получение сообщения -->
  <rect x="200" y="700" width="400" height="60" class="block" id="step-6.0"/>
  <text x="400" y="725" class="text title">6.0 Получение сообщения от сервера</text>
  <path d="M 400 760 L 400 800" class="arrow"/>

  <!-- 6.1 Проверка отправителя -->
  <rect x="200" y="800" width="400" height="60" class="block" id="step-6.1"/>
  <text x="400" y="825" class="text title">6.1 Проверка отправителя</text>
  <path d="M 400 860 L 400 900" class="arrow"/>

  <!-- 6.2 Решение: Сессия с отправителем существует? -->
  <polygon points="400,900 500,950 400,1000 300,950" class="decision" id="step-6.2"/>
  <text x="400" y="945" class="text" style="font-size: 11px;">Сессия с</text>
  <text x="400" y="960" class="text" style="font-size: 11px;">отправителем</text>
  <text x="400" y="975" class="text" style="font-size: 11px;">существует?</text>

  <!-- ДА → 6.3 Расшифровка (Double Ratchet) -->
  <path d="M 500 950 L 650 950" class="arrow"/>
  <text x="580" y="940" class="label">Да</text>
  <rect x="650" y="920" width="130" height="60" class="block" id="step-6.3"/>
  <text x="715" y="940" class="text" style="font-size: 11px;">Расшифровка</text>
  <text x="715" y="953" class="text" style="font-size: 11px;">(Double</text>
  <text x="715" y="966" class="text" style="font-size: 11px;">Ratchet)</text>

  <!-- НЕТ → 6.5 Инициализация сессии (X3DH) -->
  <path d="M 300 950 L 150 950" class="arrow"/>
  <text x="220" y="940" class="label">Нет</text>
  <rect x="20" y="920" width="130" height="60" class="block" id="step-6.5"/>
  <text x="85" y="935" class="text" style="font-size: 10px;">Инициализация</text>
  <text x="85" y="948" class="text" style="font-size: 10px;">сессии</text>
  <text x="85" y="961" class="text" style="font-size: 10px;">(X3DH receive)</text>

  <!-- 6.6 Расшифровка (Double Ratchet) -->
  <path d="M 85 920 L 85 890" class="arrow"/>
  <rect x="20" y="830" width="130" height="60" class="block" id="step-6.6"/>
  <text x="85" y="850" class="text" style="font-size: 11px;">Расшифровка</text>
  <text x="85" y="863" class="text" style="font-size: 11px;">сообщения</text>
  <text x="85" y="876" class="text" style="font-size: 10px;">(Double Ratchet)</text>

  <!-- Синхронизация потоков 6.3 и 6.6 -->
  <path d="M 715 920 L 715 900 L 400 900 L 400 1050" class="arrow"/>
  <path d="M 85 830 L 85 800 L 400 800 L 400 1050" class="arrow"/>

  <!-- 6.4 Отображение сообщения в интерфейсе -->
  <rect x="200" y="1050" width="400" height="60" class="block" id="step-6.4"/>
  <text x="400" y="1075" class="text title">6.4 Отображение сообщения в интерфейсе</text>
  <path d="M 400 1110 L 400 1150" class="arrow"/>

  <!-- 7.0 Решение: Пользователь хочет выходить? -->
  <polygon points="400,1150 500,1200 400,1250 300,1200" class="decision" id="step-7.0"/>
  <text x="400" y="1195" class="text" style="font-size: 11px;">Пользователь хочет</text>
  <text x="400" y="1210" class="text" style="font-size: 11px;">выходить?</text>

  <!-- НЕТ → Вернуться к 5.0 -->
  <path d="M 300 1200 L 150 1200 L 150 350 L 150 350" class="arrow"/>
  <text x="220" y="1190" class="label">Нет</text>

  <!-- ДА → 7.1 Выход пользователя -->
  <path d="M 400 1150 L 400 1120" class="arrow"/>
  <text x="385" y="1135" class="label">Да</text>
  <rect x="200" y="1060" width="400" height="60" class="block" id="step-7.1"/>
  <text x="400" y="1085" class="text title">7.1 Выход пользователя</text>

  <!-- 7.2 Закрытие соединения -->
  <path d="M 400 1060 L 400 1030" class="arrow"/>
  <rect x="200" y="970" width="400" height="60" class="block" id="step-7.2"/>
  <text x="400" y="995" class="text title">7.2 Закрытие соединения</text>
  <text x="400" y="1020" class="text">WSS Close</text>

  <!-- 7.3 Очистка сессионных данных -->
  <path d="M 400 970 L 400 940" class="arrow"/>
  <rect x="200" y="880" width="400" height="60" class="block" id="step-7.3"/>
  <text x="400" y="905" class="text title">7.3 Очистка сессионных данных</text>
  <text x="400" y="930" class="text">и локального состояния</text>

  <!-- 7.4 КОНЕЦ -->
  <path d="M 400 880 L 400 850" class="arrow"/>
  <rect x="250" y="800" width="300" height="50" class="block start-end" id="step-7.4"/>
  <text x="400" y="830" class="text title">7.4 КОНЕЦ</text>

  <!-- Скрытые элементы для JavaScript -->
  <g id="tooltip" style="display:none; position: absolute; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 5px;">
    <text id="tooltip-text" x="0" y="0" class="text"></text>
  </g>
</svg>
